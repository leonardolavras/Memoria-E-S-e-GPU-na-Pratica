<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <title>CPU x GPU - WebGPU</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 32px; }
    button { padding: 10px 16px; }
    table { border-collapse: collapse; margin-top: 20px; }
    th, td { border: 1px solid #999; padding: 8px 12px; text-align: right; }
    th:first-child, td:first-child { text-align: left; }
    pre { background: #f3f3f3; padding: 12px; }
  </style>
</head>
<body>
  <h1>Multiplicação de matrizes - CPU x GPU</h1>
  <p>Teste simples usando JavaScript para CPU e WebGPU para GPU.</p>
  <button id="run">Rodar testes</button>
  <div id="status"></div>
  <div id="output"></div>

<script>
const shader = `
struct Matrix {
  size: vec2f,
  numbers: array<f32>,
}

@group(0) @binding(0) var<storage, read> a: Matrix;
@group(0) @binding(1) var<storage, read> b: Matrix;
@group(0) @binding(2) var<storage, read_write> result: Matrix;

@compute @workgroup_size(8, 8)
fn main(@builtin(global_invocation_id) id: vec3u) {
  let row = id.x;
  let col = id.y;
  let rows = u32(a.size.x);
  let cols = u32(b.size.y);
  let middle = u32(a.size.y);

  if (row >= rows || col >= cols) {
    return;
  }

  var sum = 0.0;
  for (var i = 0u; i < middle; i = i + 1u) {
    sum = sum + a.numbers[row * middle + i] * b.numbers[i * cols + col];
  }

  result.numbers[row * cols + col] = sum;
}
`;

function createMatrix(n) {
  const data = new Float32Array(n * n);
  for (let i = 0; i < data.length; i++) data[i] = Math.random();
  return data;
}

function multiplyCpu(a, b, n) {
  const result = new Float32Array(n * n);
  for (let row = 0; row < n; row++) {
    for (let col = 0; col < n; col++) {
      let sum = 0;
      for (let k = 0; k < n; k++) {
        sum += a[row * n + k] * b[k * n + col];
      }
      result[row * n + col] = sum;
    }
  }
  return result;
}

async function multiplyGpu(device, module, aData, bData, n) {
  const matrixSize = 8 + aData.byteLength;

  function createBuffer(data) {
    const buffer = device.createBuffer({
      size: matrixSize,
      usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST
    });
    device.queue.writeBuffer(buffer, 0, new Float32Array([n, n]));
    device.queue.writeBuffer(buffer, 8, data);
    return buffer;
  }

  const aBuffer = createBuffer(aData);
  const bBuffer = createBuffer(bData);
  const resultBuffer = device.createBuffer({
    size: matrixSize,
    usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC | GPUBufferUsage.COPY_DST
  });
  device.queue.writeBuffer(resultBuffer, 0, new Float32Array([n, n]));

  const pipeline = device.createComputePipeline({
    layout: "auto",
    compute: { module, entryPoint: "main" }
  });

  const bindGroup = device.createBindGroup({
    layout: pipeline.getBindGroupLayout(0),
    entries: [
      { binding: 0, resource: { buffer: aBuffer } },
      { binding: 1, resource: { buffer: bBuffer } },
      { binding: 2, resource: { buffer: resultBuffer } }
    ]
  });

  const encoder = device.createCommandEncoder();
  const pass = encoder.beginComputePass();
  pass.setPipeline(pipeline);
  pass.setBindGroup(0, bindGroup);
  pass.dispatchWorkgroups(Math.ceil(n / 8), Math.ceil(n / 8));
  pass.end();

  device.queue.submit([encoder.finish()]);
  await device.queue.onSubmittedWorkDone();
}

async function run() {
  const status = document.getElementById("status");
  const output = document.getElementById("output");
  output.innerHTML = "";

  if (!navigator.gpu) {
    status.textContent = "WebGPU não está disponível neste navegador.";
    return;
  }

  const adapter = await navigator.gpu.requestAdapter();
  if (!adapter) {
    status.textContent = "Não foi possível acessar a GPU.";
    return;
  }

  const device = await adapter.requestDevice();
  const module = device.createShaderModule({ code: shader });
  const sizes = [128, 512, 1024];
  const results = [];

  for (const n of sizes) {
    status.textContent = `Rodando ${n}x${n}...`;
    const a = createMatrix(n);
    const b = createMatrix(n);

    const cpuStart = performance.now();
    multiplyCpu(a, b, n);
    const cpuTime = performance.now() - cpuStart;

    const gpuStart = performance.now();
    await multiplyGpu(device, module, a, b, n);
    const gpuTime = performance.now() - gpuStart;

    results.push({ n, cpuTime, gpuTime, speedup: cpuTime / gpuTime });
  }

  status.textContent = "Finalizado.";

  let html = "<table><tr><th>Tamanho</th><th>CPU (ms)</th><th>GPU (ms)</th><th>Speedup</th></tr>";
  for (const r of results) {
    html += `<tr><td>${r.n}x${r.n}</td><td>${r.cpuTime.toFixed(2)}</td><td>${r.gpuTime.toFixed(2)}</td><td>${r.speedup.toFixed(2)}x</td></tr>`;
  }
  html += "</table>";
  html += `<pre>${JSON.stringify(results, null, 2)}</pre>`;
  output.innerHTML = html;
}

document.getElementById("run").addEventListener("click", run);
</script>
</body>
</html>
